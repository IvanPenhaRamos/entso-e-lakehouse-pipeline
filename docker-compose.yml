x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  image: entso-e-airflow:2.9.1
  env_file:
  - .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW_USER: ${AIRFLOW_USER}
    AIRFLOW_PASSWORD: ${AIRFLOW_PASSWORD}
    AIRFLOW_FIRSTNAME: ${AIRFLOW_FIRSTNAME}
    AIRFLOW_LASTNAME: ${AIRFLOW_LASTNAME}
    AIRFLOW_EMAIL: ${AIRFLOW_EMAIL}
    AIRFLOW_ROLE: ${AIRFLOW_ROLE}
    PYTHONPATH: /opt/airflow # To resolve imports
  volumes:
    - ./dags:/opt/airflow/dags
    - ./spark:/opt/airflow/spark
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init-db:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
      airflow db init &&
      airflow users create --username ${AIRFLOW_USER} --password ${AIRFLOW_PASSWORD} --firstname ${AIRFLOW_FIRSTNAME} --lastname ${AIRFLOW_LASTNAME} --email ${AIRFLOW_EMAIL} --role ${AIRFLOW_ROLE}
      "
  
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully


  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
        minio:
          condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb local/raw &&
      mc mb local/silver &&
      mc mb local/gold
      "

  nessie:
    image: ghcr.io/projectnessie/nessie
    container_name: nessie
    environment:
      NESSIE_VERSION_STORE_TYPE: JDBC
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/nessie
      QUARKUS_DATASOURCE_USERNAME: ${NESSIE_DB_USERNAME}
      QUARKUS_DATASOURCE_PASSWORD: ${NESSIE_DB_PASSWORD}
    ports:
      - "19120:19120"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  minio-data: